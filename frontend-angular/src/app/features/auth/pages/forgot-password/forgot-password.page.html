<section class="auth-card">
  <header>
    <h2>Forgot password?</h2>
    <p>Enter your account email and we will send a secure reset link.</p>
  </header>

  @if (error()) {
    <p class="error-banner">{{ error() }}</p>
  }
  @if (success()) {
    <p class="success-banner">{{ success() }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label>
      Work email address
      <input type="email" formControlName="email" placeholder="name@company.com" autocomplete="email" />
    </label>
    @if (form.controls.email.touched && form.controls.email.invalid) {
      <small class="error">Enter a valid email address.</small>
    }

    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Sending reset link...' : 'Send reset link' }}
    </button>
  </form>

  <footer>
    <a routerLink="/auth/login">Back to login</a>
  </footer>
</section>
