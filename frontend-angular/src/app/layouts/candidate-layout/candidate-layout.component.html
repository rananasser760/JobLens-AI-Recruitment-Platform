<div class="app-shell">
  <aside class="sidebar">
    <a class="brand" routerLink="/candidate/dashboard">JobLens</a>

    <nav class="nav-links">
      <a routerLink="/candidate/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Dashboard
      </a>
      <a routerLink="/candidate/recommendations" routerLinkActive="active">Recommendations</a>
      <a routerLink="/candidate/jobs" routerLinkActive="active">Jobs</a>
      <a routerLink="/candidate/applications" routerLinkActive="active">Applications</a>
      <a routerLink="/candidate/interviews" routerLinkActive="active">Interviews</a>
      <a routerLink="/candidate/chat" routerLinkActive="active">Messages</a>
      <a routerLink="/candidate/profile" routerLinkActive="active">Profile</a>
    </nav>

    <button class="ghost-btn" type="button" (click)="logout()" [disabled]="signingOut()">
      {{ signingOut() ? 'Signing out...' : 'Sign out' }}
    </button>
  </aside>

  <section class="workspace">
    <header class="topbar">
      <input class="search" type="search" placeholder="Search opportunities, interviews, and updates..." />
      <div class="identity">
        <span class="role-chip">Candidate</span>
        <strong>{{ displayName() }}</strong>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
